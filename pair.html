<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>POPKID MD | WHATSAPP CONNECT</title>
  <meta name="theme-color" content="#1a0a0a" />
  <link rel="icon" href="https://files.catbox.moe/b2oixn.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" />
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <style>
    :root {
      --gold: #d4af37;
      --gold-light: #f5d77a;
      --gold-dim: rgba(212,175,55,0.12);
      --red: #8b0000;
      --red-light: #c1121f;
      --dark: #0a0404;
      --text: #fff5f5;
      --gray: rgba(220,200,200,0.65);
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Rajdhani', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: var(--dark);
      padding: 90px 20px 40px;
      overflow-x: hidden;
      position: relative;
    }

    /* Background atmosphere */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 55% at 50% 0%, rgba(139,0,0,0.5) 0%, transparent 65%),
        radial-gradient(ellipse 50% 40% at 90% 90%, rgba(212,175,55,0.14) 0%, transparent 55%),
        radial-gradient(ellipse 40% 40% at 10% 70%, rgba(92,0,0,0.25) 0%, transparent 55%);
      animation: atmoShift 10s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes atmoShift {
      from { opacity: 0.8; }
      to   { opacity: 1; }
    }

    /* Grain texture */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.5;
      z-index: 1;
    }

    /* ── NAVBAR ── */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(14px) saturate(1.5);
      border-bottom: 1px solid rgba(212,175,55,0.2);
      z-index: 1000;
    }

    .navbar::after {
      content: '';
      position: absolute;
      bottom: 0; left: 15%; right: 15%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212,175,55,0.45), transparent);
    }

    .navbar .brand {
      font-family: 'Cinzel', serif;
      font-weight: 900;
      font-size: 1.05rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: linear-gradient(90deg, var(--gold-light), var(--red-light), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .navbar .brand i {
      background: linear-gradient(135deg, var(--gold), var(--red-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-size: 1rem;
    }

    /* ── CARD ── */
    .pair-card {
      position: relative;
      z-index: 2;
      max-width: 420px;
      width: 100%;
      padding: 44px 36px;
      border-radius: 20px;
      border: 1px solid rgba(212,175,55,0.22);
      background: rgba(5,2,2,0.78);
      backdrop-filter: blur(20px) saturate(1.3);
      box-shadow:
        0 0 0 1px rgba(139,0,0,0.15),
        0 20px 60px rgba(0,0,0,0.8),
        0 0 80px rgba(212,175,55,0.06);
      text-align: center;
      animation: cardIn 0.7s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Corner ornaments */
    .pair-card::before, .pair-card::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      border-color: rgba(212,175,55,0.5);
      border-style: solid;
    }
    .pair-card::before {
      top: 10px; left: 10px;
      border-width: 2px 0 0 2px;
      border-radius: 3px 0 0 0;
    }
    .pair-card::after {
      bottom: 10px; right: 10px;
      border-width: 0 2px 2px 0;
      border-radius: 0 0 3px 0;
    }

    /* Top glow line */
    .card-glow-line {
      position: absolute;
      top: 0; left: 12%; right: 12%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212,175,55,0.55), transparent);
    }

    /* Card title */
    .pair-card h1 {
      font-family: 'Cinzel', serif;
      font-size: 1.15rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      background: linear-gradient(90deg, var(--gold-light), var(--red-light), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .pair-card > p {
      color: var(--gray);
      font-size: 0.9rem;
      letter-spacing: 0.04em;
      margin-bottom: 28px;
    }

    /* Divider */
    .divider {
      width: 50px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212,175,55,0.4), transparent);
      margin: 0 auto 24px;
    }

    /* Label */
    label {
      display: block;
      font-weight: 700;
      font-size: 0.82rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-align: left;
      margin-bottom: 8px;
      color: rgba(212,175,55,0.75);
    }

    /* Input */
    input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid rgba(212,175,55,0.28);
      background: rgba(139,0,0,0.12);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      margin-bottom: 18px;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
    }

    input::placeholder {
      color: rgba(255,255,255,0.25);
    }

    input:focus {
      border-color: rgba(212,175,55,0.6);
      background: rgba(139,0,0,0.2);
      box-shadow: 0 0 20px rgba(212,175,55,0.1);
    }

    /* Pair button */
    .pair-btn {
      position: relative;
      width: 100%;
      padding: 13px;
      border: 1px solid rgba(212,175,55,0.35);
      border-radius: 10px;
      font-family: 'Cinzel', serif;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.15em;
      color: #fff;
      background: transparent;
      cursor: pointer;
      overflow: hidden;
      margin-bottom: 18px;
      transition: all 0.25s cubic-bezier(0.22,1,0.36,1);
    }

    .pair-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(139,0,0,0.8), rgba(212,175,55,0.3));
      z-index: 0;
      transition: opacity 0.25s;
    }

    .pair-btn::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
      transition: left 0.5s ease;
      z-index: 1;
    }

    .pair-btn:hover {
      border-color: var(--gold);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.5), 0 0 20px rgba(212,175,55,0.2);
    }

    .pair-btn:hover::after { left: 140%; }
    .pair-btn:active { transform: translateY(0) scale(0.98); }

    .pair-btn span { position: relative; z-index: 2; }

    /* Channel button */
    .channel-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(212,175,55,0.08);
      color: var(--gold-light);
      border: 1px solid rgba(212,175,55,0.25);
      border-radius: 30px;
      padding: 9px 20px;
      text-decoration: none;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 28px;
      transition: all 0.25s;
    }

    .channel-btn:hover {
      background: rgba(212,175,55,0.15);
      border-color: rgba(212,175,55,0.5);
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .channel-btn i { color: #25d366; }

    /* Output area */
    #pair {
      min-height: 20px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.04em;
    }

    /* Code display */
    .code-box {
      display: inline-block;
      padding: 12px 20px;
      border-radius: 10px;
      border: 1px solid rgba(212,175,55,0.35);
      background: rgba(212,175,55,0.06);
      cursor: pointer;
      transition: all 0.25s;
      font-family: 'Cinzel', serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--gold-light);
      letter-spacing: 0.15em;
      text-shadow: 0 0 15px rgba(212,175,55,0.4);
    }

    .code-box:hover {
      background: rgba(212,175,55,0.12);
      border-color: var(--gold);
      box-shadow: 0 0 20px rgba(212,175,55,0.2);
    }

    .code-label {
      display: block;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(212,175,55,0.5);
      margin-bottom: 8px;
    }

    .msg-error { color: #ff6b6b; font-weight: 600; }
    .msg-warn  { color: var(--gold); font-weight: 600; }
    .msg-wait  { color: rgba(212,175,55,0.7); font-weight: 600; }
  </style>
</head>

<body>

  <nav class="navbar">
    <a href="https://github.com/popkidmain" class="brand">
      <i class="fas fa-robot"></i> POPKID PAIR-MD
    </a>
  </nav>

  <div class="pair-card">
    <div class="card-glow-line"></div>

    <h1>POPKID — PAIRING CODE</h1>
    <p>Enter your WhatsApp number without the + sign</p>
    <div class="divider"></div>

    <label for="number">Phone Number</label>
    <input type="text" id="number" placeholder="e.g., 2541234567" />
    <button id="submit" class="pair-btn"><span>GET CODE</span></button>

    <a href="https://whatsapp.com/channel/0029Vb70ySJHbFV91PNKuL3T" target="_blank" class="channel-btn">
      <i class="fab fa-whatsapp"></i> Channel
    </a>

    <div id="pair"></div>
  </div>

  <script>
    let a = document.getElementById("pair");
    let b = document.getElementById("submit");
    let c = document.getElementById("number");

    async function Copy() {
      let obj = document.getElementById("copy");
      let originalText = obj.dataset.code;
      await navigator.clipboard.writeText(originalText);
      obj.querySelector('.code-val').textContent = "COPIED ✓";
      obj.style.color = "var(--gold-light)";
      setTimeout(() => {
        obj.querySelector('.code-val').textContent = originalText;
      }, 600);
    }

    b.addEventListener("click", async (e) => {
      e.preventDefault();

      if (!c.value) {
        a.innerHTML = '<p class="msg-warn">Enter your WhatsApp number with a country code</p>';
        return;
      }

      if (c.value.replace(/[^0-9]/g, "").length < 11) {
        a.innerHTML = '<p class="msg-warn">Invalid number format</p>';
        return;
      }

      const bc = c.value.replace(/[^0-9]/g, "");
      a.innerHTML = '<p class="msg-wait"><i class="fas fa-circle-notch fa-spin" style="margin-right:6px"></i>Please wait...</p>';

      try {
        let { data } = await axios.get(`/code?number=${bc}`);
        let code = data.code || "Service Unavailable";

        a.innerHTML =
          '<span class="code-label">Tap to copy</span>' +
          '<div id="copy" class="code-box" onclick="Copy()" data-code="' + code + '">' +
            '<span class="code-val">' + code + '</span>' +
          '</div>';

      } catch (err) {
        a.innerHTML = '<p class="msg-error"><i class="fas fa-triangle-exclamation" style="margin-right:6px"></i>Error connecting to server</p>';
      }
    });
  </script>

</body>
</html>
