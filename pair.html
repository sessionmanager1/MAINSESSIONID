<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>POPKID MD | WHATSAPP CONNECT</title>
  <meta name="theme-color" content="#0a0505" />
  <link rel="icon" href="https://files.catbox.moe/b2oixn.jpg">
  
  <!-- High-End UI Typography Structure -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" />
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <style>
    :root {
      --gold: #d4af37;
      --gold-glow: rgba(212, 175, 55, 0.25);
      --crimson: #991b1b;
      --bg-main: #060303;
      --box-bg: rgba(18, 10, 10, 0.85);
      --border-color: rgba(212, 175, 55, 0.15);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: var(--bg-main);
      /* Balanced Cyberpunk tech grid alignment backdrop */
      background-image: 
        linear-gradient(rgba(153, 27, 27, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(153, 27, 27, 0.03) 1px, transparent 1px);
      background-size: 24px 24px;
      background-position: center top;
      padding: 80px 20px 40px;
      overflow-x: hidden;
    }

    /* ── PREMIUM REDESIGNED NAVBAR ── */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(6, 3, 3, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-color);
      z-index: 1000;
    }

    .navbar .brand {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-main);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: color 0.3s;
    }

    .navbar .brand i {
      color: var(--gold);
      filter: drop-shadow(0 0 8px var(--gold-glow));
    }

    .navbar .brand:hover {
      color: var(--gold);
    }

    /* ── SYMMETRICAL BOXED TERMINAL CARD ── */
    .pair-card {
      position: relative;
      max-width: 440px;
      width: 100%;
      padding: 40px 32px;
      border-radius: 16px;
      border: 1px solid var(--border-color);
      background: var(--box-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.85), inset 0 1px 0 rgba(255, 255, 255, 0.03);
      text-align: center;
    }

    /* Top accent border accent panel */
    .card-glow-line {
      position: absolute;
      top: -1px;
      left: 30px;
      right: 30px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), var(--crimson), transparent);
    }

    .pair-card h1 {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--text-main);
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .pair-card > p {
      color: var(--text-muted);
      font-size: 0.88rem;
      line-height: 1.4;
      margin-bottom: 24px;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-color), transparent);
      margin-bottom: 24px;
    }

    /* CLEAN INPUT GROUPING ARCHITECTURE */
    label {
      display: block;
      font-weight: 700;
      font-size: 0.78rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-align: left;
      margin-bottom: 8px;
      color: var(--gold);
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 10px;
      border: 1px solid var(--border-color);
      background: rgba(0, 0, 0, 0.4);
      color: var(--text-main);
      font-family: 'Share Tech Mono', monospace;
      font-size: 1.1rem;
      margin-bottom: 16px;
      outline: none;
      transition: all 0.25s ease;
      text-align: center;
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.15);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.9rem;
    }

    input:focus {
      border-color: var(--gold);
      background: rgba(153, 27, 27, 0.1);
      box-shadow: 0 0 20px rgba(212, 175, 55, 0.08);
    }

    /* HIGH-INTERACTION CORE BUTTONS */
    .pair-btn {
      width: 100%;
      padding: 14px;
      border: 1px solid var(--crimson);
      border-radius: 10px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 1.5px;
      color: var(--text-main);
      background: var(--crimson);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      margin-bottom: 14px;
      transition: all 0.25s ease;
    }

    .pair-btn:hover {
      background: #b91c1c;
      border-color: var(--gold);
      box-shadow: 0 0 20px rgba(153, 27, 27, 0.4);
      transform: translateY(-1px);
    }

    .pair-btn:active {
      transform: translateY(0) scale(0.99);
    }

    .channel-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.02);
      color: var(--text-muted);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 12px;
      width: 100%;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 24px;
      transition: all 0.25s;
    }

    .channel-btn:hover {
      background: rgba(37, 211, 102, 0.1);
      border-color: #25d366;
      color: var(--text-main);
    }

    /* TERMINAL STYLE CODES VISUALIZATION BOX */
    #pair {
      min-height: 24px;
    }

    .code-box {
      display: block;
      padding: 16px;
      border-radius: 10px;
      border: 1px dashed var(--gold);
      background: rgba(212, 175, 55, 0.03);
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Share Tech Mono', monospace;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 4px;
    }

    .code-box:hover {
      background: rgba(212, 175, 55, 0.08);
      box-shadow: 0 0 25px rgba(212, 175, 55, 0.15);
    }

    .code-label {
      display: block;
      font-size: 0.75rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .msg-error { color: #ef4444; font-size: 0.9rem; font-weight: 500; }
    .msg-warn  { color: var(--gold); font-size: 0.9rem; font-weight: 500; }
    .msg-wait  { color: var(--text-muted); font-size: 0.9rem; }

    /* Unused aesthetic overrides safely hidden */
    .pair-card::before, .pair-card::after { display: none; }
  </style>
</head>

<body>

  <nav class="navbar">
    <a href="https://github.com/popkidmain" class="brand">
      <i class="fas fa-microchip"></i> POPKID TERMINAL MD
    </a>
  </nav>

  <div class="pair-card">
    <div class="card-glow-line"></div>

    <h1>POPKID CONFIG</h1>
    <p>Enter your active WhatsApp runtime signature number below omitting the country '+' suffix prefixing.</p>
    
    <div class="divider"></div>

    <label for="number">Node Target Phone Number</label>
    <input type="text" id="number" placeholder="e.g., 2541234567" />
    <button id="submit" class="pair-btn"><span>REQUEST AUTHORIZATION</span></button>

    <a href="https://whatsapp.com/channel/0029Vb70ySJHbFV91PNKuL3T" target="_blank" class="channel-btn">
      <i class="fab fa-whatsapp" style="color:#25d366;"></i> Sync Community Channel
    </a>

    <div id="pair"></div>
  </div>

  <script>
    let a = document.getElementById("pair");
    let b = document.getElementById("submit");
    let c = document.getElementById("number");

    async function Copy() {
      let obj = document.getElementById("copy");
      let originalText = obj.dataset.code;
      await navigator.clipboard.writeText(originalText);
      obj.querySelector('.code-val').textContent = "COPIED";
      obj.style.color = "#25d366";
      setTimeout(() => {
        obj.querySelector('.code-val').textContent = originalText;
        obj.style.color = "var(--gold)";
      }, 700);
    }

    b.addEventListener("click", async (e) => {
      e.preventDefault();

      if (!c.value) {
        a.innerHTML = '<p class="msg-warn"><i class="fas fa-circle-exclamation"></i> Input parameter verification payload required.</p>';
        return;
      }

      if (c.value.replace(/[^0-9]/g, "").length < 11) {
        a.innerHTML = '<p class="msg-warn"><i class="fas fa-circle-exclamation"></i> Length invalid. Confirm regional country index payload.</p>';
        return;
      }

      const bc = c.value.replace(/[^0-9]/g, "");
      a.innerHTML = '<p class="msg-wait"><i class="fas fa-circle-notch fa-spin"></i> Initializing handshake sequence...</p>';

      try {
        let { data } = await axios.get(`/code?number=${bc}`);
        let code = data.code || "Service Unavailable";

        a.innerHTML =
          '<span class="code-label">Click to copy secure key</span>' +
          '<div id="copy" class="code-box" onclick="Copy()" data-code="' + code + '">' +
            '<span class="code-val">' + code + '</span>' +
          '</div>';

      } catch (err) {
        a.innerHTML = '<p class="msg-error"><i class="fas fa-triangle-exclamation"></i> Handshake link dropped. Server unresponsive.</p>';
      }
    });
  </script>

</body>
</html>
