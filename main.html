<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>POPKID XD SESSIONS</title>

<!-- Modern Google Fonts: Space Grotesk for sleek tech headings & Inter for crisp UI text -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700;800&display=swap" rel="stylesheet">
<script src="https://kit.fontawesome.com/a2e0da6e4c.js" crossorigin="anonymous"></script>

<style>
:root {
  --bg-dark: #070913;
  --panel-bg: rgba(13, 17, 34, 0.7);
  --card-bg: rgba(20, 26, 48, 0.5);
  
  --primary: #4f46e5;
  --primary-glow: rgba(79, 70, 229, 0.4);
  --cyan: #06b6d4;
  --cyan-glow: rgba(6, 182, 212, 0.3);
  
  --text-main: #f8fafc;
  --text-muted: #94a3b8;
  --border-color: rgba(255, 255, 255, 0.07);
  --border-hover: rgba(6, 182, 212, 0.4);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  background-color: var(--bg-dark);
  /* Cyberpunk style techno-grid background overlay */
  background-image: 
    linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
  background-size: 30px 30px;
  background-position: center top;
  font-family: 'Inter', sans-serif;
  color: var(--text-main);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

/* Centralized Structured Master Container */
.main-content {
  width: 100%;
  max-width: 680px;
  background: var(--panel-bg);
  border: 1px solid var(--border-color);
  border-radius: 24px;
  padding: 40px;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.05);
  position: relative;
  overflow: hidden;
}

/* Subtle corner decoration frames */
.main-content::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 4px;
  background: linear-gradient(90deg, var(--primary), var(--cyan), var(--primary));
}

/* Logo Hub Architecture */
.logo {
  display: flex;
  justify-content: center;
  margin-bottom: 24px;
}

.logo-ring {
  position: relative;
  width: 110px;
  height: 110px;
  padding: 5px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid var(--border-color);
}

.logo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 50%;
  filter: drop-shadow(0 0 15px var(--primary-glow));
  transition: transform 0.5s ease;
}

.main-content:hover .logo img {
  transform: rotate(360deg);
}

/* Clean High-Tech Header Styling */
h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 2rem;
  font-weight: 800;
  text-align: center;
  letter-spacing: 2px;
  margin-bottom: 30px;
  text-transform: uppercase;
  background: linear-gradient(135deg, #fff 30%, var(--cyan) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* Grid Balanced Status Bar Terminal */
.status-bar {
  display: grid;
  grid-template-columns: 1.2fr 1fr 1fr;
  align-items: center;
  text-align: center;
  background: rgba(0, 0, 0, 0.3);
  border: 1px solid var(--border-color);
  padding: 14px;
  border-radius: 14px;
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text-muted);
  margin-bottom: 30px;
}

#time {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  color: var(--text-main);
}

.pulse-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #10b981;
  box-shadow: 0 0 10px #10b981;
  animation: pulse 2s infinite;
}

#battery-status {
  color: var(--cyan);
  font-family: monospace;
}

/* Boxed Layout Compartments */
.section {
  background: var(--card-bg);
  border: 1px solid var(--border-color);
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 20px;
  transition: all 0.3s ease;
}

.section:hover {
  border-color: var(--border-hover);
  box-shadow: 0 10px 30px rgba(6, 182, 212, 0.05);
  transform: translateY(-2px);
}

.section h3 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--cyan);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}

/* Linear Layout Buttons Grid */
.btn-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
}

.dev-section .btn-grid {
  grid-template-columns: 1fr 1fr;
}

.btn {
  width: 100%;
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid var(--border-color);
  color: var(--text-main);
  padding: 16px 24px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.95rem;
  font-weight: 600;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.25s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

.btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, var(--primary), var(--cyan));
  opacity: 0;
  transition: opacity 0.3s ease;
  z-index: 1;
}

.btn span {
  position: relative;
  z-index: 2;
}

.btn:hover {
  border-color: transparent;
  box-shadow: 0 0 20px rgba(79, 70, 229, 0.4);
  transform: scale(1.01);
}

.btn:hover::before {
  opacity: 1;
}

.btn:active {
  transform: scale(0.99);
}

/* Minimalist Clean Footer Layout */
.footer {
  margin-top: 40px;
  text-align: center;
}

.footer-divider {
  width: 40px;
  height: 2px;
  background: rgba(255, 255, 255, 0.1);
  margin: 0 auto 20px auto;
}

.footer div {
  font-size: 0.8rem;
  color: var(--text-muted);
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.9); }
}

/* Mobile Adaptive Layout Optimization */
@media (max-width: 580px) {
  .main-content {
    padding: 24px 20px;
    border-radius: 20px;
  }
  
  .status-bar {
    grid-template-columns: 1fr;
    gap: 8px;
    padding: 12px;
  }
  
  .dev-section .btn-grid {
    grid-template-columns: 1fr;
  }
  
  h1 {
    font-size: 1.6rem;
  }
}

/* Native Unused/Hidden elements preserved for stability but cleanly hidden from view */
.notch, .corner-tl, .corner-br {
  display: none;
}
</style>
</head>

<body>

<div class="main-content">

  <!-- Retained structurally for target hooks if scripts refer to them implicitly -->
  <div class="notch"></div>
  <div class="corner-tl"></div>
  <div class="corner-br"></div>

  <div class="logo">
    <div class="logo-ring">
      <img src="https://files.catbox.moe/j9ia5c.png" alt="POPKID Logo">
    </div>
  </div>

  <h1>POPKID XMD 2026</h1>

  <div class="status-bar">
    <div id="time">
      <span class="pulse-dot"></span>
      <span id="time-val"></span>
    </div>
    <div id="date"></div>
    <div id="battery-status">
      <i class="fas fa-battery-full"></i>
    </div>
  </div>

  <div class="section">
    <h3><i class="fa-solid fa-terminal" style="font-size:0.8rem;"></i> Get Session ID</h3>
    <div class="btn-grid">
      <button class="btn" onclick="window.open('/pair')">
        <span>Pair Code</span>
      </button>
    </div>
  </div>

  <div class="section dev-section">
    <h3><i class="fa-solid fa-code" style="font-size:0.8rem;"></i> Developer &amp; Community</h3>
    <div class="btn-grid">
      <button class="btn" onclick="window.open('https://github.com/popkidmain')">
        <span>GitHub</span>
      </button>
      <button class="btn" onclick="window.open('https://whatsapp.com/channel/0029Vb70ySJHbFV91PNKuL3T')">
        <span>WhatsApp</span>
      </button>
    </div>
  </div>

  <div class="footer">
    <div class="footer-divider"></div>
    <div>Made with passion by popkid</div>
    <div>By popkidprojects ❤️‍🩹</div>
  </div>

</div>

<script>
function updateTime() {
  const time = new Date();
  document.getElementById('time-val').textContent = time.toLocaleTimeString();
  document.getElementById('date').textContent = time.toLocaleDateString();
}

function updateBatteryStatus() {
  if (navigator.getBattery) {
    navigator.getBattery().then(function(battery) {
      let level = Math.round(battery.level * 100) + '%';
      let charging = battery.charging ? 'Charging' : 'Discharging';
      document.getElementById('battery-status').textContent = level + ' | ' + charging;
    });
  }
}

setInterval(updateTime, 1000);
updateTime();
updateBatteryStatus();
</script>

</body>
</html>
